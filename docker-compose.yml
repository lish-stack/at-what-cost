services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    env_file: .env
    ports:
      - "8000:8000"

  scraping:
    build: ./scraping
    volumes:
      - ./scraping:/app
      - ./data:/app/data
    env_file: .env
    ports:
      - "8001:8001"

  n8n:
    image: n8nio/n8n
    env_file: .env
    environment:
      # n8n stores its own config in SQLite by default — no postgres needed
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
    env_file: .env
    ports:
      - "3000:3000"

volumes:
  n8n_data:

# ─── Removed ────────────────────────────────────────────────
# Local postgres service removed — Supabase is the database.
# n8n now uses SQLite for its own internal storage (simpler, no local DB needed).
# All services read credentials from .env via env_file.